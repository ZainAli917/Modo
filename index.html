<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ✅ PWA REQUIRED META TAGS -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />

  <!-- ✅ App Identity -->
  <title>Modo</title>
  <meta name="description" content="Modo - Your simple To-Do and Quick Notes app. Offline ready." />
  <meta name="application-name" content="Modo" />
  <meta name="keywords" content="todo, notes, productivity, offline, pwa" />

  <!-- ✅ PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- ✅ Theme Colors -->
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="msapplication-TileColor" content="#1a1a2e" />
  <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
  <meta name="msapplication-config" content="/browserconfig.xml" />

  <!-- ✅ Apple / iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Modo" />
  <link rel="apple-touch-icon" href="/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72x72.png" />
  <link rel="apple-touch-icon" sizes="96x96" href="/icons/icon-96x96.png" />
  <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png" />
  <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" />

  <!-- ✅ Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72x72.png" />
  <link rel="shortcut icon" href="/icons/icon-96x96.png" />

  <!-- ✅ Open Graph (for sharing) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Modo - To-Do & Quick Notes" />
  <meta property="og:description" content="Simple, fast, offline-ready productivity app." />
  <meta property="og:image" content="/icons/icon-512x512.png" />
  <meta property="og:url" content="https://modo-nu.vercel.app/" />

  <!-- ✅ Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Modo" />
  <meta name="twitter:description" content="Simple To-Do & Notes app" />
  <meta name="twitter:image" content="/icons/icon-512x512.png" />

  <!-- ✅ Security -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';" />
  <meta name="referrer" content="no-referrer" />

  <!-- ✅ Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- ✅ Original Styles -->
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --accent: #e94560;
      --accent2: #0f3460;
      --text: #eaeaea;
      --text-muted: #888;
      --border: #2a2a3e;
      --success: #4ecca3;
      --radius: 12px;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ---- HEADER ---- */
    header {
      background: var(--surface);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .offline-badge {
      font-size: 11px;
      background: var(--accent2);
      color: var(--success);
      padding: 3px 8px;
      border-radius: 20px;
      font-family: var(--mono);
      display: none;
    }

    .offline-badge.show { display: block; }

    /* ---- MAIN ---- */
    main {
      max-width: 540px;
      margin: 0 auto;
      padding: 20px 16px 120px;
    }

    /* ---- SECTION TITLE ---- */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
      margin-top: 28px;
    }

    /* ---- TODO INPUT ---- */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: var(--accent); }
    .input-row input::placeholder { color: var(--text-muted); }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:active { opacity: 0.8; transform: scale(0.97); }

    /* ---- TODO LIST ---- */
    #todo-list { display: flex; flex-direction: column; gap: 8px; }

    .todo-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn 0.2s ease;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .todo-check {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .todo-item.done .todo-check {
      background: var(--success);
      border-color: var(--success);
    }

    .todo-check::after {
      content: '✓';
      color: var(--bg);
      font-size: 13px;
      font-weight: 700;
      display: none;
    }

    .todo-item.done .todo-check::after { display: block; }

    .todo-text { flex: 1; font-size: 15px; line-height: 1.4; }

    .todo-del {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      line-height: 1;
      opacity: 0.5;
      transition: opacity 0.15s;
    }

    .todo-del:hover { opacity: 1; color: var(--accent); }

    /* ---- NOTES ---- */
    #notes-area {
      width: 100%;
      min-height: 160px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.7;
      padding: 14px 16px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    #notes-area:focus { border-color: var(--accent); }
    #notes-area::placeholder { color: var(--text-muted); }

    .notes-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }

    .notes-saved {
      font-size: 12px;
      color: var(--success);
      font-family: var(--mono);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .notes-saved.show { opacity: 1; }

    .char-count {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* ---- EMPTY STATE ---- */
    .empty {
      text-align: center;
      padding: 32px 0;
      color: var(--text-muted);
      font-size: 14px;
    }

    .empty-icon { font-size: 36px; margin-bottom: 8px; }

    /* ---- INSTALL BANNER ---- */
    #install-banner {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      max-width: 508px;
      margin: 0 auto;
      background: var(--surface2);
      border: 1.5px solid var(--accent);
      border-radius: 14px;
      padding: 16px;
      display: none;
      align-items: center;
      gap: 12px;
      z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: slideUp 0.3s ease;
    }

    #install-banner.show { display: flex; }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .install-text { flex: 1; font-size: 14px; line-height: 1.4; }
    .install-text strong { color: var(--accent); }

    .install-btns { display: flex; gap: 8px; }

    .btn-sm {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: var(--font);
    }

    .btn-install { background: var(--accent); color: white; }
    .btn-dismiss { background: var(--border); color: var(--text-muted); }
  </style>

  <!-- ⭐️ NEW: Advanced modern styles (glassmorphism, dark/light, etc.) -->
  <link rel="stylesheet" href="advanced-styles.css">
</head>
<body>

  <header>
    <div class="logo">Mo<span>do</span></div>
    <span class="offline-badge" id="offline-badge">● Offline</span>
  </header>

  <main>
    <!-- TO-DO SECTION -->
    <div class="section-title">To-Do</div>
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="Add a task..." maxlength="200" autocomplete="off" />
      <button class="btn" onclick="addTodo()">Add</button>
    </div>
    <div id="todo-list"></div>

    <!-- QUICK NOTES SECTION -->
    <div class="section-title">Quick Notes</div>
    <textarea id="notes-area" placeholder="Type your notes here... (auto-saved)" rows="6"></textarea>
    <div class="notes-footer">
      <span class="notes-saved" id="notes-saved">✓ Saved</span>
      <span class="char-count" id="char-count">0 chars</span>
    </div>
  </main>

  <!-- PWA Install Banner -->
  <div id="install-banner">
    <div class="install-text">
      <strong>Install Modo</strong><br/>
      Add to home screen for offline access
    </div>
    <div class="install-btns">
      <button class="btn-sm btn-dismiss" onclick="dismissInstall()">Later</button>
      <button class="btn-sm btn-install" onclick="installApp()">Install</button>
    </div>
  </div>

  <script>
    // ======= DATA LAYER (localStorage) =======
    let todos = JSON.parse(localStorage.getItem('modo-todos') || '[]');
    let notes = localStorage.getItem('modo-notes') || '';

    function saveTodos() {
      localStorage.setItem('modo-todos', JSON.stringify(todos));
    }

    function saveNotes(val) {
      localStorage.setItem('modo-notes', val);
    }

    // ======= RENDER TODOS =======
    function renderTodos() {
      const list = document.getElementById('todo-list');
      if (todos.length === 0) {
        list.innerHTML = '<div class="empty"><div class="empty-icon">✅</div>No tasks yet. Add one above!</div>';
        return;
      }
      list.innerHTML = todos.map((t, i) => `
        <div class="todo-item ${t.done ? 'done' : ''}" id="todo-${i}">
          <div class="todo-check" onclick="toggleTodo(${i})"></div>
          <span class="todo-text">${escHtml(t.text)}</span>
          <button class="todo-del" onclick="deleteTodo(${i})" aria-label="Delete">×</button>
        </div>
      `).join('');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('todo-input');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ text, done: false, created: Date.now() });
      saveTodos();
      renderTodos();
      input.value = '';
      input.focus();
    }

    function toggleTodo(i) {
      todos[i].done = !todos[i].done;
      saveTodos();
      renderTodos();
    }

    function deleteTodo(i) {
      todos.splice(i, 1);
      saveTodos();
      renderTodos();
    }

    // Enter key support
    document.getElementById('todo-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTodo();
    });

    // ======= NOTES =======
    const notesArea = document.getElementById('notes-area');
    const notesSaved = document.getElementById('notes-saved');
    const charCount = document.getElementById('char-count');
    notesArea.value = notes;
    charCount.textContent = notes.length + ' chars';

    let saveTimeout;
    notesArea.addEventListener('input', () => {
      charCount.textContent = notesArea.value.length + ' chars';
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        saveNotes(notesArea.value);
        notesSaved.classList.add('show');
        setTimeout(() => notesSaved.classList.remove('show'), 2000);
      }, 600);
    });

    // ======= INIT =======
    renderTodos();

    // ======= SERVICE WORKER =======
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW failed:', err));
      });
    }

    // ======= OFFLINE DETECTION =======
    function updateOnlineStatus() {
      const badge = document.getElementById('offline-badge');
      if (!navigator.onLine) {
        badge.classList.add('show');
      } else {
        badge.classList.remove('show');
      }
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // ======= PWA INSTALL =======
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const alreadyDismissed = localStorage.getItem('modo-install-dismissed');
      if (!alreadyDismissed) {
        setTimeout(() => {
          document.getElementById('install-banner').classList.add('show');
        }, 3000);
      }
    });

    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => {
          deferredPrompt = null;
          document.getElementById('install-banner').classList.remove('show');
        });
      }
    }

    function dismissInstall() {
      document.getElementById('install-banner').classList.remove('show');
      localStorage.setItem('modo-install-dismissed', '1');
    }

    // Handle URL shortcuts
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('action') === 'add-todo') {
      document.getElementById('todo-input').focus();
    } else if (urlParams.get('action') === 'add-note') {
      notesArea.focus();
    }
  </script>

  <!-- ⭐️ NEW: All advanced features (drop‑in, no existing code harmed) -->
  <script src="advanced-script.js" defer></script>
</body>
</html>
