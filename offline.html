<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modo - Offline</title>
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f0f1a;
      color: #eaeaea;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #888; font-size: 15px; max-width: 300px; line-height: 1.5; }
    button {
      margin-top: 24px;
      background: #e94560;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>No internet connection. Your saved todos and notes are still available!</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
